<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Command Center | IoT Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #05070a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .glow-blue {
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.4));
        }

        .glow-red {
            filter: drop-shadow(0 0 8px rgba(220, 38, 38, 0.4));
        }

        .glow-amber {
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.4));
        }

        .sidebar-item:hover {
            background: rgba(30, 41, 59, 0.5);
            border-left: 3px solid #3b82f6;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.7;
            }
        }

        /* Custom Map Grid Background */
        .map-bg {
            background-image:
                radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(37, 99, 235, 0.3);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // API CONFIGURATION
        // ============================================
        const API_CONFIG = {
            DEVICE_SERVICE: 'http://localhost:8081',
            EVENT_SERVICE: 'http://localhost:8083',
            DEFAULT_TENANT: 'NYPD',
            REFRESH_INTERVAL: 5000 // 5 seconds
        };

        // ============================================
        // API SERVICE LAYER
        // ============================================
        class DeviceService {
            static async getOfficers(tenantId) {
                const response = await fetch(`${API_CONFIG.DEVICE_SERVICE}/api/v1/police/officers`, {
                    headers: { 'X-Tenant-Id': tenantId }
                });
                if (!response.ok) throw new Error('Failed to fetch officers');
                return response.json();
            }

            static async createOfficer(tenantId, officer) {
                const response = await fetch(`${API_CONFIG.DEVICE_SERVICE}/api/v1/police/officers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Tenant-Id': tenantId
                    },
                    body: JSON.stringify(officer)
                });
                if (!response.ok) throw new Error('Failed to create officer');
                return response.json();
            }

            static async getVehicles(tenantId) {
                const response = await fetch(`${API_CONFIG.DEVICE_SERVICE}/api/v1/police/vehicles`, {
                    headers: { 'X-Tenant-Id': tenantId }
                });
                if (!response.ok) throw new Error('Failed to fetch vehicles');
                return response.json();
            }

            static async getIncidents(tenantId) {
                const response = await fetch(`${API_CONFIG.DEVICE_SERVICE}/api/v1/police/incidents`, {
                    headers: { 'X-Tenant-Id': tenantId }
                });
                if (!response.ok) throw new Error('Failed to fetch incidents');
                return response.json();
            }
        }

        class TelemetryService {
            static async getAllTelemetry() {
                const response = await fetch(`${API_CONFIG.EVENT_SERVICE}/api/v1/telemetry/all`);
                if (!response.ok) throw new Error('Failed to fetch telemetry');
                return response.json();
            }

            static async getDeviceCount() {
                const response = await fetch(`${API_CONFIG.EVENT_SERVICE}/api/v1/telemetry/count`);
                if (!response.ok) throw new Error('Failed to fetch device count');
                return response.json();
            }

            static async getDeviceTelemetry(deviceId) {
                const response = await fetch(`${API_CONFIG.EVENT_SERVICE}/api/v1/telemetry/device/${deviceId}`);
                if (!response.ok) throw new Error('Failed to fetch device telemetry');
                return response.json();
            }
        }

        // ============================================
        // COMPONENTS
        // ============================================

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name.toLowerCase()} className={className}></i>;
        };

        const MetricCard = ({ title, value, subtext, icon, trend, loading }) => (
            <div className="glass rounded-xl p-5 card-shadow flex flex-col gap-2">
                <div className="flex justify-between items-center text-slate-400">
                    <span className="text-sm font-semibold uppercase tracking-wider">{title}</span>
                    <Icon name={icon} className="w-5 h-5 text-blue-500" />
                </div>
                <div className="text-3xl font-bold">
                    {loading ? '...' : value}
                </div>
                <div className={`text-xs ${trend > 0 ? 'text-emerald-400' : 'text-slate-500'}`}>
                    {trend > 0 && <span>↑</span>} {subtext}
                </div>
            </div>
        );

        const Sidebar = ({ activeTab, setTab }) => {
            const sidebarItems = [
                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Dashboard' },
                { id: 'map', icon: 'Map', label: 'Live Map' },
                { id: 'officers', icon: 'Users', label: 'Officers' },
                { id: 'alerts', icon: 'Bell', label: 'Alert Feed' },
                { id: 'settings', icon: 'Settings', label: 'Settings' }
            ];

            return (
                <aside className="w-64 h-screen border-r border-slate-800 flex flex-col glass fixed left-0 top-0 z-50">
                    <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                        <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center glow-blue">
                            <Icon name="Shield" className="text-white w-5 h-5" />
                        </div>
                        <h1 className="text-xl font-bold tracking-tight">POLICE <span className="text-blue-500">IOT</span></h1>
                    </div>

                    <nav className="flex-1 mt-6">
                        {sidebarItems.map(item => (
                            <div
                                key={item.id}
                                onClick={() => setTab(item.id)}
                                className={`sidebar-item flex items-center gap-4 px-6 py-4 cursor-pointer transition-all duration-200 ${activeTab === item.id ? 'bg-slate-800/50 border-left-3 border-blue-500 text-blue-400' : 'text-slate-400'
                                    }`}
                            >
                                <Icon name={item.icon} />
                                <span className="font-medium">{item.label}</span>
                            </div>
                        ))}
                    </nav>

                    <div className="p-6 border-t border-slate-800 flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-slate-700 overflow-hidden border border-slate-600">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=3b82f6&color=fff" alt="Avatar" />
                        </div>
                        <div className="flex flex-col">
                            <span className="text-sm font-semibold">Chief Admin</span>
                            <span className="text-xs text-slate-500">Command Center</span>
                        </div>
                    </div>
                </aside>
            );
        };

        // ============================================
        // DASHBOARD VIEW
        // ============================================

        const DashboardView = ({ tenantId, telemetry, officers, vehicles, loading }) => {
            const [selectedAsset, setSelectedAsset] = useState(null);
            const alertTelemetry = telemetry.filter(t =>
                t.status === 'SOS' || t.speed > 120
            ).slice(0, 10);

            const telemetryRate = telemetry.length > 0 ?
                (telemetry.length * 0.2).toFixed(1) + 'k' : '0';

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <MetricCard
                        title="Active Officers"
                        value={officers.length}
                        subtext={`${officers.filter(o => o.status === 'ACTIVE').length} on duty`}
                        icon="Users"
                        trend={1}
                        loading={loading}
                    />
                    <MetricCard
                        title="Fleet Status"
                        value={vehicles.length}
                        subtext={`${vehicles.filter(v => v.status === 'AVAILABLE').length} available`}
                        icon="Car"
                        trend={1}
                        loading={loading}
                    />
                    <MetricCard
                        title="Live Alerts"
                        value={alertTelemetry.length}
                        subtext="Active incidents"
                        icon="Bell"
                        trend={0}
                        loading={loading}
                    />
                    <MetricCard
                        title="Telemetry/s"
                        value={telemetryRate}
                        subtext="Kafka Healthy"
                        icon="Activity"
                        trend={1}
                        loading={loading}
                    />

                    <div className="col-span-1 lg:col-span-3 glass rounded-xl p-6 card-shadow overflow-hidden min-h-[400px] flex flex-col relative">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-bold">Live Asset Distribution</h2>
                            <div className="flex gap-4">
                                <div className="flex items-center gap-2 text-xs"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Patrol</div>
                                <div className="flex items-center gap-2 text-xs"><div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> Emergency</div>
                                <div className="flex items-center gap-2 text-xs"><div className="w-2 h-2 rounded-full bg-amber-500"></div> High Speed</div>
                            </div>
                        </div>
                        {/* Live Map View */}
                        <div className="flex-1 rounded-lg border border-slate-800 map-bg relative overflow-hidden bg-slate-900/50">
                            {telemetry.slice(0, 50).map((t, i) => {
                                const [lat, lng] = (t.location || '40.7128,-74.0060').split(',').map(parseFloat);
                                const normalizedLat = ((lat - 40) % 1) * 80 + 10;
                                const normalizedLng = ((lng + 74) % 1) * 80 + 10;
                                const color = t.status === 'SOS' ? 'bg-red-500 ring-red-500/20 glow-red' :
                                    t.speed > 120 ? 'bg-amber-500 ring-amber-500/20 glow-amber' :
                                        'bg-blue-500 ring-blue-500/20 glow-blue';

                                return (
                                    <div
                                        key={t.deviceId || i}
                                        className={`absolute w-3 h-3 rounded-full ring-4 animate-pulse cursor-pointer ${color}`}
                                        style={{
                                            top: `${normalizedLat}%`,
                                            left: `${normalizedLng}%`
                                        }}
                                        title={`${t.deviceId} - ${t.status || 'NORMAL'}`}
                                        onClick={() => setSelectedAsset(t)}
                                    ></div>
                                );
                            })}
                            {selectedAsset && (
                                <div className="absolute bottom-4 right-4 w-72 p-4 rounded-xl border border-slate-700 bg-slate-900/95 shadow-2xl z-20">
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="font-bold text-sm">{selectedAsset.deviceId}</div>
                                        <button
                                            className="text-slate-400 hover:text-white text-xs"
                                            onClick={() => setSelectedAsset(null)}
                                        >
                                            Close
                                        </button>
                                    </div>
                                    <div className="text-xs space-y-1.5">
                                        <div>Status: <span className={`font-semibold ${selectedAsset.status === 'SOS' ? 'text-red-400' : 'text-emerald-400'}`}>{selectedAsset.status || 'NORMAL'}</span></div>
                                        <div>Speed: <span className="font-semibold">{selectedAsset.speed ?? 0} km/h</span></div>
                                        <div>Battery: <span className="font-semibold">{selectedAsset.batteryLevel ?? 'N/A'}%</span></div>
                                        <div>Officer: <span className="font-semibold">{selectedAsset.officerId || 'N/A'}</span></div>
                                        <div>Time: <span className="font-semibold">{new Date(selectedAsset.timestamp || Date.now()).toLocaleString()}</span></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="col-span-1 glass rounded-xl p-6 card-shadow flex flex-col">
                        <h2 className="text-lg font-bold mb-6">Real-time Feed</h2>
                        <div className="flex-1 overflow-y-auto space-y-4 pr-2 scrollbar-hide max-h-[350px]">
                            {alertTelemetry.map((t, i) => (
                                <div key={i} className="flex gap-4 p-3 rounded-lg bg-slate-800/30 border border-slate-700/50">
                                    <div className={`w-10 h-10 rounded flex items-center justify-center shrink-0 ${t.status === 'SOS' ? 'bg-red-900/40 text-red-500 glow-red' : 'bg-amber-900/40 text-amber-500'
                                        }`}>
                                        <Icon name={t.status === 'SOS' ? 'AlertOctagon' : 'Zap'} className="w-5 h-5" />
                                    </div>
                                    <div>
                                        <div className="text-sm font-bold">{t.deviceId} - {t.status || 'SPEED'}</div>
                                        <div className="text-xs text-slate-400 mt-1">
                                            {t.status === 'SOS' ? 'Emergency button pressed' : `High speed: ${t.speed} km/h`}
                                        </div>
                                        <div className="text-[10px] text-slate-500 mt-1 uppercase font-semibold">
                                            {new Date(t.timestamp || Date.now()).toLocaleTimeString()}
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {alertTelemetry.length === 0 && (
                                <div className="text-center text-slate-500 py-8">No active alerts</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================
        // OFFICERS VIEW
        // ============================================

        const OfficersView = ({ tenantId, officers, onRefresh }) => {
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({
                userId: '', name: '', badgeNumber: '', status: 'ACTIVE'
            });
            const [submitting, setSubmitting] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitting(true);
                try {
                    await DeviceService.createOfficer(tenantId, formData);
                    setFormData({ userId: '', name: '', badgeNumber: '', status: 'ACTIVE' });
                    setShowForm(false);
                    onRefresh();
                } catch (error) {
                    alert('Failed to create officer: ' + error.message);
                } finally {
                    setSubmitting(false);
                }
            };

            return (
                <div className="glass rounded-xl p-6 card-shadow">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Officers Management</h2>
                        <button
                            onClick={() => setShowForm(!showForm)}
                            className="btn-primary px-4 py-2 rounded-lg font-semibold flex items-center gap-2"
                        >
                            <Icon name="UserPlus" className="w-4 h-4" />
                            Add Officer
                        </button>
                    </div>

                    {showForm && (
                        <form onSubmit={handleSubmit} className="mb-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700">
                            <div className="grid grid-cols-2 gap-4">
                                <input
                                    type="text"
                                    placeholder="User ID"
                                    value={formData.userId}
                                    onChange={(e) => setFormData({ ...formData, userId: e.target.value })}
                                    className="input-field px-4 py-2 rounded-lg text-white"
                                    required
                                />
                                <input
                                    type="text"
                                    placeholder="Full Name"
                                    value={formData.name}
                                    onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                    className="input-field px-4 py-2 rounded-lg text-white"
                                    required
                                />
                                <input
                                    type="text"
                                    placeholder="Badge Number"
                                    value={formData.badgeNumber}
                                    onChange={(e) => setFormData({ ...formData, badgeNumber: e.target.value })}
                                    className="input-field px-4 py-2 rounded-lg text-white"
                                    required
                                />
                                <select
                                    value={formData.status}
                                    onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                    className="input-field px-4 py-2 rounded-lg text-white"
                                >
                                    <option value="ACTIVE">Active</option>
                                    <option value="OFF_DUTY">Off Duty</option>
                                    <option value="ON_LEAVE">On Leave</option>
                                </select>
                            </div>
                            <div className="flex gap-2 mt-4">
                                <button type="submit" disabled={submitting} className="btn-primary px-6 py-2 rounded-lg font-semibold">
                                    {submitting ? 'Creating...' : 'Create Officer'}
                                </button>
                                <button type="button" onClick={() => setShowForm(false)} className="px-6 py-2 rounded-lg font-semibold bg-slate-700 hover:bg-slate-600">
                                    Cancel
                                </button>
                            </div>
                        </form>
                    )}

                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead>
                                <tr className="border-b border-slate-700">
                                    <th className="text-left py-3 px-4 text-slate-400 font-semibold">Badge</th>
                                    <th className="text-left py-3 px-4 text-slate-400 font-semibold">Name</th>
                                    <th className="text-left py-3 px-4 text-slate-400 font-semibold">User ID</th>
                                    <th className="text-left py-3 px-4 text-slate-400 font-semibold">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {officers.map((officer, i) => (
                                    <tr key={i} className="border-b border-slate-800 hover:bg-slate-800/30">
                                        <td className="py-3 px-4 font-mono">{officer.badgeNumber}</td>
                                        <td className="py-3 px-4 font-semibold">{officer.name}</td>
                                        <td className="py-3 px-4 text-slate-400">{officer.userId}</td>
                                        <td className="py-3 px-4">
                                            <span className={`px-3 py-1 rounded-full text-xs font-semibold ${officer.status === 'ACTIVE' ? 'bg-emerald-900/40 text-emerald-400' : 'bg-slate-700 text-slate-400'
                                                }`}>
                                                {officer.status}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {officers.length === 0 && (
                            <div className="text-center text-slate-500 py-12">No officers found for this tenant</div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================
        // LIVE MAP VIEW
        // ============================================

        const LiveMapView = ({ telemetry }) => {
            const [selectedDevice, setSelectedDevice] = useState(null);

            return (
                <div className="glass rounded-xl p-6 card-shadow h-[calc(100vh-200px)]">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Live Asset Map</h2>
                        <div className="flex gap-4">
                            <div className="flex items-center gap-2 text-sm">
                                <div className="w-3 h-3 rounded-full bg-blue-500"></div> Normal ({telemetry.filter(t => t.status !== 'SOS' && t.speed <= 120).length})
                            </div>
                            <div className="flex items-center gap-2 text-sm">
                                <div className="w-3 h-3 rounded-full bg-amber-500"></div> High Speed ({telemetry.filter(t => t.speed > 120 && t.status !== 'SOS').length})
                            </div>
                            <div className="flex items-center gap-2 text-sm">
                                <div className="w-3 h-3 rounded-full bg-red-500"></div> SOS ({telemetry.filter(t => t.status === 'SOS').length})
                            </div>
                        </div>
                    </div>

                    <div className="relative h-full rounded-lg border border-slate-800 map-bg bg-slate-900/50 overflow-hidden">
                        {telemetry.map((t, i) => {
                            const [lat, lng] = (t.location || '40.7128,-74.0060').split(',').map(parseFloat);
                            const normalizedLat = ((lat - 40) % 1) * 80 + 10;
                            const normalizedLng = ((lng + 74) % 1) * 80 + 10;
                            const color = t.status === 'SOS' ? 'bg-red-500 ring-red-500/20 glow-red' :
                                t.speed > 120 ? 'bg-amber-500 ring-amber-500/20 glow-amber' :
                                    'bg-blue-500 ring-blue-500/20 glow-blue';

                            return (
                                <div
                                    key={t.deviceId || i}
                                    className={`absolute w-4 h-4 rounded-full ring-4 cursor-pointer transition-all hover:scale-150 ${color}`}
                                    style={{
                                        top: `${normalizedLat}%`,
                                        left: `${normalizedLng}%`
                                    }}
                                    onClick={() => setSelectedDevice(t)}
                                ></div>
                            );
                        })}

                        {selectedDevice && (
                            <div className="absolute top-4 right-4 glass p-4 rounded-lg w-80 border border-slate-700">
                                <div className="flex justify-between items-start mb-3">
                                    <h3 className="font-bold text-lg">{selectedDevice.deviceId}</h3>
                                    <button onClick={() => setSelectedDevice(null)} className="text-slate-400 hover:text-white">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="space-y-2 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Status:</span>
                                        <span className={`font-semibold ${selectedDevice.status === 'SOS' ? 'text-red-400' : 'text-emerald-400'}`}>
                                            {selectedDevice.status || 'NORMAL'}
                                        </span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Speed:</span>
                                        <span className="font-semibold">{selectedDevice.speed} km/h</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Battery:</span>
                                        <span className="font-semibold">{selectedDevice.batteryLevel}%</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Location:</span>
                                        <span className="font-mono text-xs">{selectedDevice.location}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Officer:</span>
                                        <span className="font-semibold">{selectedDevice.officerId || 'N/A'}</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-slate-400">Last Update:</span>
                                        <span className="text-xs">{new Date(selectedDevice.timestamp || Date.now()).toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================
        // ALERTS VIEW
        // ============================================

        const AlertsView = ({ telemetry }) => {
            const [filter, setFilter] = useState('ALL');

            const alerts = telemetry
                .filter(t => t.status === 'SOS' || t.speed > 120)
                .filter(t => filter === 'ALL' ||
                    (filter === 'SOS' && t.status === 'SOS') ||
                    (filter === 'SPEED' && t.speed > 120 && t.status !== 'SOS'))
                .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            return (
                <div className="glass rounded-xl p-6 card-shadow">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">Alert Feed</h2>
                        <div className="flex gap-2">
                            {['ALL', 'SOS', 'SPEED'].map(f => (
                                <button
                                    key={f}
                                    onClick={() => setFilter(f)}
                                    className={`px-4 py-2 rounded-lg font-semibold transition-all ${filter === f ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                        }`}
                                >
                                    {f}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-3 max-h-[calc(100vh-300px)] overflow-y-auto pr-2 scrollbar-hide">
                        {alerts.map((t, i) => (
                            <div key={i} className="flex gap-4 p-4 rounded-lg bg-slate-800/30 border border-slate-700/50 hover:bg-slate-800/50 transition-all">
                                <div className={`w-12 h-12 rounded-lg flex items-center justify-center shrink-0 ${t.status === 'SOS' ? 'bg-red-900/40 text-red-500 glow-red' : 'bg-amber-900/40 text-amber-500 glow-amber'
                                    }`}>
                                    <Icon name={t.status === 'SOS' ? 'AlertOctagon' : 'Zap'} className="w-6 h-6" />
                                </div>
                                <div className="flex-1">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <div className="text-base font-bold">{t.deviceId}</div>
                                            <div className="text-sm text-slate-400 mt-1">
                                                {t.status === 'SOS' ? '🚨 Emergency SOS Triggered' : `⚠️ High Speed Alert: ${t.speed} km/h`}
                                            </div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${t.status === 'SOS' ? 'bg-red-900/40 text-red-400' : 'bg-amber-900/40 text-amber-400'
                                            }`}>
                                            {t.status === 'SOS' ? 'CRITICAL' : 'WARNING'}
                                        </span>
                                    </div>
                                    <div className="mt-2 grid grid-cols-3 gap-4 text-xs">
                                        <div>
                                            <span className="text-slate-500">Location:</span>
                                            <div className="font-mono">{t.location}</div>
                                        </div>
                                        <div>
                                            <span className="text-slate-500">Officer:</span>
                                            <div className="font-semibold">{t.officerId || 'Unassigned'}</div>
                                        </div>
                                        <div>
                                            <span className="text-slate-500">Time:</span>
                                            <div>{new Date(t.timestamp || Date.now()).toLocaleTimeString()}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {alerts.length === 0 && (
                            <div className="text-center text-slate-500 py-12">No alerts matching filter</div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================
        // SETTINGS VIEW
        // ============================================

        const SettingsView = ({ tenantId, setTenantId, refreshInterval, setRefreshInterval }) => {
            const tenants = ['NYPD', 'LAPD', 'CPD', 'SFPD', 'NYPD_TRANSIT'];

            return (
                <div className="glass rounded-xl p-6 card-shadow max-w-2xl">
                    <h2 className="text-2xl font-bold mb-6">Command Configuration</h2>

                    <div className="space-y-6">
                        <div>
                            <label className="block text-sm font-semibold text-slate-400 mb-2">Active Tenant</label>
                            <select
                                value={tenantId}
                                onChange={(e) => setTenantId(e.target.value)}
                                className="input-field w-full px-4 py-3 rounded-lg text-white"
                            >
                                {tenants.map(t => (
                                    <option key={t} value={t}>{t}</option>
                                ))}
                            </select>
                            <p className="text-xs text-slate-500 mt-2">Switching tenant will reload all data for the selected department</p>
                        </div>

                        <div>
                            <label className="block text-sm font-semibold text-slate-400 mb-2">Refresh Interval (seconds)</label>
                            <input
                                type="number"
                                value={refreshInterval / 1000}
                                onChange={(e) => setRefreshInterval(Math.max(1, parseInt(e.target.value)) * 1000)}
                                className="input-field w-full px-4 py-3 rounded-lg text-white"
                                min="1"
                                max="60"
                            />
                            <p className="text-xs text-slate-500 mt-2">How often to refresh telemetry and device data</p>
                        </div>

                        <div className="pt-4 border-t border-slate-700">
                            <h3 className="font-semibold mb-3">API Endpoints</h3>
                            <div className="space-y-2 text-sm">
                                <div className="flex justify-between">
                                    <span className="text-slate-400">Device Service:</span>
                                    <span className="font-mono text-blue-400">{API_CONFIG.DEVICE_SERVICE}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-slate-400">Event Service:</span>
                                    <span className="font-mono text-blue-400">{API_CONFIG.EVENT_SERVICE}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================
        // MAIN APP
        // ============================================

        const App = () => {
            const [activeTab, setTab] = useState('dashboard');
            const [tenantId, setTenantId] = useState(API_CONFIG.DEFAULT_TENANT);
            const [refreshInterval, setRefreshInterval] = useState(API_CONFIG.REFRESH_INTERVAL);

            const [telemetry, setTelemetry] = useState([]);
            const [officers, setOfficers] = useState([]);
            const [vehicles, setVehicles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const fetchData = async () => {
                try {
                    setError(null);
                    const [telemetryData, officersData, vehiclesData] = await Promise.all([
                        TelemetryService.getAllTelemetry().catch(() => []),
                        DeviceService.getOfficers(tenantId).catch(() => []),
                        DeviceService.getVehicles(tenantId).catch(() => [])
                    ]);

                    setTelemetry(telemetryData);
                    setOfficers(officersData);
                    setVehicles(vehiclesData);
                    setLoading(false);
                } catch (err) {
                    setError(err.message);
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, refreshInterval);
                return () => clearInterval(interval);
            }, [tenantId, refreshInterval]);

            return (
                <div className="flex min-h-screen bg-[#05070a]">
                    <Sidebar activeTab={activeTab} setTab={setTab} />

                    <main className="ml-64 flex-1 p-8">
                        <header className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-2xl font-bold capitalize">{activeTab}</h1>
                                <p className="text-sm text-slate-500">Real-time Police IoT Command & Control Platform</p>
                            </div>
                            <div className="flex gap-4">
                                <div className="glass px-4 py-2 rounded-lg flex items-center gap-3 text-sm border border-slate-700">
                                    <div className={`w-2 h-2 rounded-full ${error ? 'bg-red-500' : 'bg-emerald-500'} shadow-[0_0_8px_rgba(16,185,129,0.5)]`}></div>
                                    Network: {error ? 'ERROR' : 'ONLINE'}
                                </div>
                                <div className="glass px-4 py-2 rounded-lg flex items-center gap-3 text-sm border border-slate-700">
                                    Tenant: <span className="font-bold text-blue-400">{tenantId}</span>
                                </div>
                            </div>
                        </header>

                        {error && (
                            <div className="mb-6 p-4 bg-red-900/20 border border-red-500/50 rounded-lg text-red-400">
                                <strong>Connection Error:</strong> {error}. Make sure services are running.
                            </div>
                        )}

                        {activeTab === 'dashboard' && <DashboardView tenantId={tenantId} telemetry={telemetry} officers={officers} vehicles={vehicles} loading={loading} />}
                        {activeTab === 'officers' && <OfficersView tenantId={tenantId} officers={officers} onRefresh={fetchData} />}
                        {activeTab === 'map' && <LiveMapView telemetry={telemetry} />}
                        {activeTab === 'alerts' && <AlertsView telemetry={telemetry} />}
                        {activeTab === 'settings' && <SettingsView tenantId={tenantId} setTenantId={setTenantId} refreshInterval={refreshInterval} setRefreshInterval={setRefreshInterval} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
